<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_slide-base.css">
<style>
.close { justify-content: center; text-align: center; align-items: center; }
.close h2 { font-family: "Cormorant Garamond", serif; font-size: 56px; max-width: 20ch; margin-bottom: 40px; }
.compare { display: grid; grid-template-columns: 1fr auto 1fr; gap: 40px; align-items: center; max-width: 1400px; margin: 0 auto; }
.col { text-align: left; padding: 36px 40px; border-radius: 8px; border: 1px solid var(--line); background: rgba(255,255,255,.45); }
.col h3 { font-size: 26px; margin-bottom: 16px; letter-spacing: .08em; }
.col p { font-size: 21px; line-height: 1.6; color: var(--ink-soft); }
.col.bad { border-top: 3px solid rgba(90,83,70,.4); }
.col.good { border-top: 3px solid var(--pine); }
.vs { font-family: "Cormorant Garamond", serif; font-size: 32px; font-style: italic; color: var(--ochre); }
.cta { margin-top: 48px; font-size: 24px; color: var(--pine); letter-spacing: .12em; }
</style>
</head>
<body>
<section class="slide close">
  <p class="eyebrow" style="text-align:center;">Positioning · 策略定位</p>
  <h2>借鑑競品深度，保持中環高端合規定位</h2>
  <div class="compare">
    <div class="col bad">
      <h3>養康式（參考）</h3>
      <p>內容厚度 + WhatsApp 短轉化 + 社交種草 + 促銷著陸</p>
    </div>
    <div class="vs">→</div>
    <div class="col good">
      <h3>頤安現站</h3>
      <p>症狀著陸頁 + WA 優先 + FAQ/Blog SEO + Google 5.0 信任 · 不促銷、不誇大療效</p>
    </div>
  </div>
  <p class="cta">共同 KPI：whatsapp_click · oakvilles.com</p>
  <div class="footer-bar"></div>
</section>
</body>
</html>
