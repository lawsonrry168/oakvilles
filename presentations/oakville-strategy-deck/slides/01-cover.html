<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_slide-base.css">
<style>
.cover { justify-content: center; padding-bottom: 120px; }
.cover h1 { max-width: 16ch; font-size: 88px; }
.meta { margin-top: 48px; display: flex; gap: 32px; flex-wrap: wrap; }

.seal {

  border: 3px solid var(--cinnabar); display: grid; place-items: center;
  color: var(--cinnabar); font-size: 28px; font-weight: 700; letter-spacing: .2em;
  transform: rotate(-4deg); opacity: .85;
}
</style>
</head>
<body>
<section class="slide cover">

  <h1>舊站 vs 新站<br><em>改進總結</em><br>與廣告部署策略</h1>

  <div class="meta">
    <span>oakvilles.com</span>
    <span>2026 · 06</span>
    <span>Vercel 自動部署</span>
  </div>
  <div class="seal" aria-hidden="true">頤安</div>
  <div class="footer-bar"></div>
</section>

</html>
